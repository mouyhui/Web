<!DOCTYPE html>
<html>
<head>
	<title>Module 3 - Links - Yonghui</title>
	<link rel="stylesheet" href="style.css">
</head>

<body>
	<!-- apply the same style.css as the internal.html -->
	<h2> Clickable hyperlinks </h2>
	<form>
		<div>
			<label>Open Internal Link in the same tab: </label>
			<a href="internal.html">Internal Page</a>
		</div>

		<div>
			<label>Open Internal Link in a new tab: </label>
			<a href="internal.html" target="_blank">Internal Page</a>
		</div>
		<br>
		<div>
			<label>Open external Link in a new tab: </label>
			<a href="https://www.google.com" target="_blank">Navigate to Google</a>
		</div>
	</form>
</body>
</html>
