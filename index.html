<!DOCTYPE html>
<html>
<head>
	<title>Module 3 - Links - Yonghui</title>
	<link rel="stylesheet" href="style.css">
</head>

<body>
	<!-- apply the same style.css as the internal.html -->
	<h2> Clickable hyperlinks </h2>
	<form>
		<div>
			<label>Open Internal Link in the same tab: </label>
			<a href="internal.html">Internal Page</a>
		</div>

		<div>
			<label>Open Internal Link in a new tab: </label>
			<a href="internal.html" target="_blank">Internal Page</a>
		</div>
		<br>
		<div>
			<label>Open external Link in a new window (less recommended): </label>
			<a href="https://www.google.com" onclick="window.open(this.href, 'newwindow', 'width=800,height=600'); return false;">Navigate to Google in a new Window</a>
		</div>
		<br>
		<div>
			<label>Contact: </label>
			<!-- Relative path -->
			<a href="pages/contact.html" target="_blank">Email Us</a>
		</div>		
	</form>
</body>
</html>
